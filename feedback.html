
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback - WanderNest</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      color: white;
      padding: 20px;
    }

    .feedback-container {
      background: white;
      max-width: 500px;
      margin: 30px auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
    }

    .stars {
      display: flex;
      gap: 5px;
      font-size: 25px;
      cursor: pointer;
      margin-top: 5px;
    }

    .stars span {
      color: gray;
    }

    .stars span.active {
      color: gold;
    }

    .emoji {
      font-size: 25px;
      cursor: pointer;
      margin: 5px;
    }

    .emoji.selected {
      transform: scale(1.3);
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }

    .success {
      display: none;
      text-align: center;
      color: green;
      margin-top: 15px;
      font-weight: bold;
    }

    .counter {
      font-size: 12px;
      text-align: right;
      color: gray;
    }
  </style>
</head>

<title>WanderNest - Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>WanderNest</h1>
<nav id="navLinks">
<a href="home.html">Home</a>
<a href="destination.html">Destinations</a>
<a href="package.html">Packages</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="feedback.html">Feedback</a>

</nav>
</header>



<div class="feedback-container">

  <form onsubmit="submitFeedback(event)">

    <label>Your Name</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Rate Your Experience</label>
    <div class="stars" id="starRating">
      <span onclick="rate(1)">★</span>
      <span onclick="rate(2)">★</span>
      <span onclick="rate(3)">★</span>
      <span onclick="rate(4)">★</span>
      <span onclick="rate(5)">★</span>
    </div>

    <label>Your Mood</label>
    <div>
      <span class="emoji" onclick="selectEmoji(this)">😡</span>
      <span class="emoji" onclick="selectEmoji(this)">😐</span>
      <span class="emoji" onclick="selectEmoji(this)">😊</span>
      <span class="emoji" onclick="selectEmoji(this)">😍</span>
    </div>

    <label>Your Feedback</label>
    <textarea id="feedbackText" rows="4" maxlength="200" oninput="countChars()" required></textarea>
    <div class="counter" id="charCount">0 / 200</div>

    <button type="submit">Submit Feedback</button>

    <div class="success" id="successMsg">
      🎉 Thank you! Your feedback has been submitted.
    </div>

  </form>

</div>

<script>
let rating = 0;

function rate(value) {
  rating = value;
  const stars = document.querySelectorAll(".stars span");
  stars.forEach((star, index) => {
    star.classList.toggle("active", index < value);
  });
}

function selectEmoji(el) {
  document.querySelectorAll(".emoji").forEach(e => e.classList.remove("selected"));
  el.classList.add("selected");
}

function countChars() {
  let text = document.getElementById("feedbackText").value;
  document.getElementById("charCount").innerText = text.length + " / 200";
}

function submitFeedback(event) {
  event.preventDefault();
  document.getElementById("successMsg").style.display = "block";
}
</script>
<div class="footer">
  <p>© WanderNest | All Rights Reserved</p>
</div>
</body>
</html>
